name: CI

on:
  push:
    branches:
      - main
      - master
      - "codex/**"
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download Modules
        run: go mod download

      - name: Verify go.sum Integrity
        run: go mod verify

      - name: Vet
        run: sudo apt-get update && sudo apt-get install -y libxrandr-dev libxcursor-dev libxinerama-dev libxi-dev libgl1-mesa-dev xorg-dev
        go vet ./...

      - name: Test
        run: go test ./...

      - name: Staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck ./...

      - name: Install Wails CLI
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build Browser Bundle
        run: make browser

      - name: Validate Artifacts
        run: make verify-artifacts

  linux-native:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install GTK dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libadwaita-1-dev

      - name: Build Linux core
        run: make ffi-linux

      - name: Run Linux GTK tests
        run: cargo test --manifest-path native/linux-gtk/Cargo.toml

      - name: Check Flatpak manifest
        run: test -f native/linux-gtk/dev.truco.Native.yaml

  build:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            ext: ""
          - os: windows
            arch: amd64
            ext: ".exe"
          - os: darwin
            arch: amd64
            ext: ""
          - os: darwin
            arch: arm64
            ext: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build Executable (Client)
        run: |
          mkdir -p bin/tui
          CGO_ENABLED=0 GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} go build -ldflags="-s -w" -o bin/tui/truco-tui-core-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }} ./cmd/truco

      - name: Build Executable (Relay)
        run: |
          CGO_ENABLED=0 GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} go build -ldflags="-s -w" -o bin/truco-relay-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }} ./cmd/truco-relay

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: binaries-core-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            bin/tui/truco*
            bin/truco-relay*
